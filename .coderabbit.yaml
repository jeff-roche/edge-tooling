language: en-US

reviews:
  profile: chill
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  sequence_diagrams: false
  poem: false
  review_status: true
  changed_files_summary: true
  collapse_walkthrough: false
  request_changes_workflow: false
  abort_on_close: true

  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - main

  path_filters:
    - "!two-node-toolbox/**"

  path_instructions:
    - path: "**"
      instructions: |
        Review all changes against the guidelines in CONTRIBUTING.md. Flag any violations as severity level "medium".
        When a finding is a violation of CONTRIBUTING.md, explicitly state that in the comment (e.g., "Per CONTRIBUTING.md: ...") and quote or reference the specific guideline being violated.

    - path: ".githooks/**"
      instructions: |
        Pre-commit hooks are high-blast-radius — they affect every contributor on every commit.
        Challenge any change that:
        - Adds new verification steps beyond lint/secrets (per CONTRIBUTING.md "Review Principles")
        - Could block commits unrelated to the changed subsystem
        Flag as severity "high" if the PR description does not justify why this check must be pre-commit rather than CI or CodeRabbit.

    - path: "plugins/*/skills/**/SKILL.md"
      instructions: |
        Review this skill against the quality guidelines in plugins/docs/SKILL-GUIDELINES.md.
        Check for:
        - Description quality: specific, front-loaded use case, under 1024 chars
        - Instruction clarity: numbered steps, clear stop conditions, output format
        - Safety: destructive operations require user confirmation, no credential logging
        - Edge cases: failure modes documented, guard checks between phases
        - Modularity: under 500 lines, reference material in separate files
        - Tool restrictions: allowed-tools specified to limit blast radius
        Flag missing edge cases or safety guards as severity "high".

    - path: ".claude/skills/**"
      instructions: |
        The .claude/skills/ directory is high-blast-radius — skills here are loaded for every contributor.
        Challenge any change that:
        - Adds files that are symlinks, path references, or thin wrappers pointing to content elsewhere (e.g., plugins/)
        - Introduces skills that require a sync script or external process to stay current
        - Duplicates content that already exists in another location in the repo
        - Adds derived state that can drift from its source
        Flag as severity "high" if the skill could be better served as a plugin under plugins/.
        Ask the PR author: "Would this be better served as a plugin skill under plugins/?"

  tools:
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    ruff:
      enabled: true

chat:
  auto_reply: true
  integrations:
    jira:
      usage: auto

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto

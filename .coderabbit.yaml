language: en-US

reviews:
  profile: chill
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  sequence_diagrams: false
  poem: false
  review_status: true
  changed_files_summary: true
  collapse_walkthrough: false
  request_changes_workflow: false
  abort_on_close: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!two-node-toolbox/**"

  tools:
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    ruff:
      enabled: true

chat:
  auto_reply: true
  integrations:
    jira:
      usage: auto

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto

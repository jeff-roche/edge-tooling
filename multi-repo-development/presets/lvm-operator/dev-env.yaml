# LVM Operator (LVMS) Development Environment
# =============================================
#
# This file defines all repositories needed for LVMS development.
# Used by setup.sh to clone and manage repos.

repos:
  - name: lvm-operator
    url: https://github.com/openshift/lvm-operator.git
    branch: main
    category: development
    summary: "Core operator source — bundle, must-gather, Tekton pipelines, tests"

  - name: topolvm
    url: https://github.com/openshift/topolvm.git
    branch: main
    category: development
    summary: "Underlying CSI driver that LVM Operator imports to manage host LVM"

  - name: release
    url: https://github.com/openshift/release.git
    branch: master
    category: testing
    summary: "CI/CD configuration — Prow jobs and test workflows for LVMS"

  - name: konflux-release-data
    url: https://gitlab.cee.redhat.com/releng/konflux-release-data
    branch: main
    category: deployment
    summary: "Konflux build/release orchestration — staging and production pipelines"

  - name: product-definitions
    url: https://gitlab.cee.redhat.com/prodsec/product-definitions
    branch: master
    category: deployment
    summary: "Product Security gatekeeper — approved LVMS versions and CPE definitions"
